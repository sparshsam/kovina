<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 400" width="1200" height="400">
  <defs>
    <style>
      @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;700&amp;display=swap');
      .open { font-family: 'Inter', 'Arial', sans-serif; font-weight: 700; font-size: 96px; letter-spacing: 0.05em; }
      .product { font-family: 'Inter', 'Arial', sans-serif; font-weight: 500; font-size: 96px; }
      .tagline { font-family: 'Inter', 'Arial', sans-serif; font-weight: 400; font-size: 20px; fill: #555555; }
    </style>
  </defs>
  <text x="600" y="180" class="open" fill="#111111" text-anchor="middle">OPEN</text>
  <text x="600" y="240" class="product" fill="#111111" text-anchor="middle">ProductName</text>
  <text x="600" y="290" class="tagline" text-anchor="middle">One-line description of the application</text>
</svg>
